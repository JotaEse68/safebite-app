[build]
  publish = "."
  functions = "functions"

[functions]
  node_bundler = "esbuild"

[functions."analyze"]
  timeout = 26

# Netlify functions deben ir ANTES del catch-all SPA
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
